<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인증 오류 | RudyNote</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #ffffff;
            color: #18181b;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Main */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Error card — LoginForm과 동일한 카드 스타일 */
        .error-card {
            width: 100%;
            max-width: 400px;
            border: 1px solid #e4e4e7;
            border-radius: 0.75rem;
            background: #ffffff;
            padding: 2rem;
        }

        /* 에러 코드 배지 */
        .error-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 500;
            color: #ef4444;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 9999px;
            padding: 0.2rem 0.65rem;
            margin-bottom: 1.25rem;
            font-family: 'Courier New', Courier, monospace;
        }

        .error-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #18181b;
            margin-bottom: 0.5rem;
        }

        .error-description {
            font-size: 0.875rem;
            color: #71717a;
            line-height: 1.6;
            margin-bottom: 1.75rem;
        }

        /* 버튼 — blog Button primary 스타일 */
        .btn-back {
            display: inline-block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #ffffff;
            background: #18181b;
            border: none;
            border-radius: 0.375rem;
            padding: 0.375rem 0.75rem;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .btn-back:hover {
            background: #3f3f46;
        }
    </style>
</head>
<body>

<main>
    <div class="error-card">
        <span class="error-badge" th:text="${error}">error_code</span>

        <h1 class="error-title">인증 요청 오류</h1>

        <p class="error-description"
           th:text="${errorDescription != null ? errorDescription : '잘못된 인증 요청입니다. 클라이언트 설정을 확인해 주세요.'}">
            오류 설명이 여기에 표시됩니다.
        </p>

        <a href="javascript:history.back()" class="btn-back">이전 페이지로</a>
    </div>
</main>

</body>
</html>
