services:
  auth-postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    ports:
      - "10000:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-net
  auth-redis:
    image: redis:7-alpine
    ports:
      - "20000:6379"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-net
networks:
  auth-net:
    driver: bridge