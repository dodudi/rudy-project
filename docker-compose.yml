services:
  redis:
    image: redis:7.4
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - backend-net
  postgresql:
    image: postgres:14.2
    container_name: postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test1234
      POSTGRES_DB: redis-study
    volumes:
      - ./postgresql-data:/var/lib/postgresql/data
    networks:
      - backend-net
networks:
  backend-net:
    driver: bridge