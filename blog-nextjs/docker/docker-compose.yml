services:
  blog-postgres:
    image: postgres:14.2
    ports:
      - "10001:5432"
    command: postgres -c lock_timeout=5000
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./postgresql-data:/var/lib/postgresql/data
    networks:
      - blog-net
  blog-minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - blog-net
networks:
  blog-net:
    driver: bridge