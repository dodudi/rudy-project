<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 실패</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .params { text-align: left; background: #fff3f3; border-radius: 8px; padding: 16px; margin-bottom: 24px; font-size: 0.9rem; }
        .params div { margin-bottom: 6px; }
        a.btn { display: inline-block; padding: 10px 24px; background: #eee; color: #333; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="icon">✕</div>
<h1>결제에 실패했습니다</h1>

<div class="params">
    <div><strong>errorCode:</strong> <span th:text="${param.code}"></span></div>
    <div><strong>message:</strong> <span th:text="${param.message}"></span></div>
</div>

<a href="/orders" class="btn">주문 목록으로</a>

</body>
</html>
