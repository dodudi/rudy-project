<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 내역</title>
    <style>
        body { font-family: sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
        th { background: #f5f5f5; font-size: 0.9rem; }
        td.number { text-align: right; }
        .status { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .status-PENDING   { background: #fff8e1; color: #f57f17; }
        .status-COMPLETED { background: #e8f5e9; color: #2e7d32; }
        .status-FAILED    { background: #ffebee; color: #b71c1c; }
        .status-REFUNDED  { background: #f3e5f5; color: #6a1b9a; }
        .empty { text-align: center; padding: 40px; color: #999; }
        a.home { font-size: 0.85rem; color: #888; text-decoration: none; }
        a.home:hover { text-decoration: underline; }
        .filter-form { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; padding: 16px; background: #f9f9f9; border-radius: 6px; }
        .filter-form label { font-size: 0.8rem; color: #555; display: block; margin-bottom: 4px; }
        .filter-form input, .filter-form select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
        .filter-form button { padding: 7px 16px; background: #1976d2; color: white; border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer; }
        .filter-form button:hover { background: #1565c0; }
        .btn-reset { padding: 7px 16px; border-radius: 4px; text-decoration: none; font-size: 0.9rem; background: #eee; color: #333; }
    </style>
</head>
<body>

<div class="top">
    <div>
        <a class="home" th:href="@{/}">← 홈</a>
        <h1>결제 내역</h1>
    </div>
</div>

<form method="get" th:action="@{/payment/list}" class="filter-form">
    <div>
        <label for="memberId">회원 ID</label>
        <input id="memberId" type="number" name="memberId" placeholder="회원 ID"
               th:value="${filter.memberId}">
    </div>
    <div>
        <label for="orderId">주문 ID</label>
        <input id="orderId" type="number" name="orderId" placeholder="주문 ID"
               th:value="${filter.orderId}">
    </div>
    <div>
        <label for="status">상태</label>
        <select id="status" name="status">
            <option value="">전체</option>
            <option value="PENDING"   th:selected="${filter.status == 'PENDING'}">대기</option>
            <option value="COMPLETED" th:selected="${filter.status == 'COMPLETED'}">완료</option>
            <option value="FAILED"    th:selected="${filter.status == 'FAILED'}">실패</option>
            <option value="REFUNDED"  th:selected="${filter.status == 'REFUNDED'}">환불</option>
        </select>
    </div>
    <div>
        <label for="minAmount">최소 금액</label>
        <input id="minAmount" type="number" name="minAmount" placeholder="0"
               th:value="${filter.minAmount}">
    </div>
    <div>
        <label for="maxAmount">최대 금액</label>
        <input id="maxAmount" type="number" name="maxAmount" placeholder="최대"
               th:value="${filter.maxAmount}">
    </div>
    <div>
        <label for="startDate">시작일</label>
        <input id="startDate" type="datetime-local">
        <input type="hidden" id="startDateHidden" name="startDate" th:value="${filter.startDate}">
    </div>
    <div>
        <label for="endDate">종료일</label>
        <input id="endDate" type="datetime-local">
        <input type="hidden" id="endDateHidden" name="endDate" th:value="${filter.endDate}">
    </div>
    <div>
        <button type="submit">검색</button>
        <a th:href="@{/payment/list}" class="btn-reset">초기화</a>
    </div>
</form>

<table>
    <thead>
        <tr>
            <th>결제 ID</th>
            <th>주문 ID</th>
            <th>회원 ID</th>
            <th>상태</th>
            <th>결제 금액</th>
            <th>결제 일시</th>
        </tr>
    </thead>
    <tbody>
        <tr th:if="${#lists.isEmpty(payments)}">
            <td colspan="6" class="empty">결제 내역이 없습니다.</td>
        </tr>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.id}"></td>
            <td th:text="${payment.orderId}"></td>
            <td th:text="${payment.memberId}"></td>
            <td>
                <span class="status"
                      th:classappend="'status-' + ${payment.status}"
                      th:text="${payment.status}"></span>
            </td>
            <td class="number" th:text="${#numbers.formatInteger(payment.amount, 0, 'COMMA')} + '원'"></td>
            <td class="local-time" th:attr="data-utc=${payment.createdAt}"></td>
        </tr>
    </tbody>
</table>

<script>
    document.querySelectorAll('.local-time').forEach(td => {
        const utc = td.dataset.utc;
        if (utc) {
            td.textContent = new Date(utc).toLocaleString(undefined, {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
    });

    function isoToLocalInput(isoStr) {
        const d = new Date(isoStr);
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}-${mo}-${day}T${h}:${mi}`;
    }

    ['startDate', 'endDate'].forEach(id => {
        const hidden = document.getElementById(id + 'Hidden');
        if (hidden && hidden.value) {
            document.getElementById(id).value = isoToLocalInput(hidden.value);
        }
    });

    function setIsoDate(pickerId, hiddenId) {
        const picker = document.getElementById(pickerId);
        const hidden = document.getElementById(hiddenId);
        if (picker.value) {
            const [date, time] = picker.value.split('T');
            const [y, mo, d] = date.split('-').map(Number);
            const [h, mi] = time.split(':').map(Number);
            hidden.value = new Date(y, mo - 1, d, h, mi).toISOString();
        } else {
            hidden.value = '';
        }
    }

    document.querySelector('.filter-form').addEventListener('submit', function () {
        setIsoDate('startDate', 'startDateHidden');
        setIsoDate('endDate', 'endDateHidden');
    });
</script>

</body>
</html>
