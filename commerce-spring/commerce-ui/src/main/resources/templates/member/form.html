<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원 추가</title>
    <style>
        body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: red; font-size: 0.85rem; margin-top: 4px; }
        .alert-error { background: #ffe0e0; border: 1px solid #f99; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        .hint { font-size: 0.8rem; color: #888; margin-top: 3px; }
        .actions { display: flex; gap: 8px; margin-top: 20px; }
        button[type=submit] { padding: 10px 24px; background: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        a.back { padding: 10px 16px; background: #eee; border-radius: 4px; text-decoration: none; color: #333; }
    </style>
</head>
<body>

<h1>회원 추가</h1>

<div th:if="${error}" class="alert-error" th:text="${error}"></div>

<form th:action="@{/members}" th:object="${memberCreateRequest}" method="post">

    <div class="form-group">
        <label>아이디</label>
        <input type="text" th:field="*{username}" placeholder="영문, 숫자 6~20자">
        <div class="hint">영문, 숫자만 허용 (6~20자)</div>
        <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
    </div>

    <div class="form-group">
        <label>비밀번호</label>
        <input type="password" th:field="*{password}" placeholder="최소 12자">
        <div class="hint">영문, 숫자, 특수문자(!@#$%^&*) 각 1개 이상 포함, 최소 12자</div>
        <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
    </div>

    <div class="form-group">
        <label>닉네임</label>
        <input type="text" th:field="*{nickname}" placeholder="영문, 숫자 2~20자">
        <div class="hint">영문, 숫자만 허용 (2~20자)</div>
        <div class="error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></div>
    </div>

    <div class="actions">
        <button type="submit">등록</button>
        <a class="back" th:href="@{/members}">목록으로</a>
    </div>

</form>

</body>
</html>
