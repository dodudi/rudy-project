<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 목록</title>
    <style>
        body { font-family: sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        a.btn { padding: 8px 16px; background: #4caf50; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
        th { background: #f5f5f5; font-size: 0.9rem; }
        td.number { text-align: right; }
        .status { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .status-CREATED    { background: #e3f2fd; color: #1565c0; }
        .status-COMPLETED  { background: #e8f5e9; color: #2e7d32; }
        .status-SETTLED    { background: #f3e5f5; color: #6a1b9a; }
        .status-CANCELLED  { background: #fce4ec; color: #c62828; }
        .status-FAILED     { background: #ffebee; color: #b71c1c; }
        .items { font-size: 0.85rem; color: #555; }
        .items li { margin: 2px 0; }
        .empty { text-align: center; padding: 40px; color: #999; }
        a.home { font-size: 0.85rem; color: #888; text-decoration: none; }
        a.home:hover { text-decoration: underline; }
        .filter-form { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; padding: 16px; background: #f9f9f9; border-radius: 6px; }
        .filter-form label { font-size: 0.8rem; color: #555; display: block; margin-bottom: 4px; }
        .filter-form input, .filter-form select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
        .filter-form button { padding: 7px 16px; background: #1976d2; color: white; border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer; }
        .filter-form button:hover { background: #1565c0; }
        .btn-reset { background: #eee !important; color: #333 !important; }
        .btn-reset:hover { background: #ddd !important; }
        .btn-refund { padding: 4px 10px; background: #ef5350; color: white; border: none; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
        .btn-refund:hover { background: #c62828; }
        .btn-cancel { padding: 4px 10px; background: #757575; color: white; border: none; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
        .btn-cancel:hover { background: #424242; }
        .alert { padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; font-size: 0.9rem; }
        .alert-success { background: #e8f5e9; color: #2e7d32; }
        .alert-error   { background: #ffebee; color: #b71c1c; }

        /* 모달 */
        .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; }
        .modal-backdrop.open { display: flex; align-items: center; justify-content: center; }
        .modal { background: white; border-radius: 8px; padding: 24px; width: 380px; }
        .modal h2 { font-size: 1.1rem; margin: 0 0 16px; }
        .modal label { font-size: 0.85rem; color: #555; display: block; margin-bottom: 4px; }
        .modal textarea { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; resize: vertical; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .modal-actions button { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .btn-cancel-modal { background: #eee; color: #333; }
        .btn-confirm-refund { background: #ef5350; color: white; }
        .btn-confirm-cancel { background: #757575; color: white; }
    </style>
</head>
<body>

<div class="top">
    <h1>주문 목록</h1>
    <a th:href="@{/orders/new}" class="btn">+ 주문 생성</a>
</div>

<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
<div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

<form method="get" th:action="@{/orders}" class="filter-form">
    <div>
        <label for="memberId">회원 ID</label>
        <input id="memberId" type="number" name="memberId" placeholder="회원 ID"
               th:value="${filter.memberId}">
    </div>
    <div>
        <label for="status">상태</label>
        <select id="status" name="status">
            <option value="">전체</option>
            <option value="CREATED"    th:selected="${filter.status == 'CREATED'}">주문 생성</option>
            <option value="COMPLETED"  th:selected="${filter.status == 'COMPLETED'}">결제 완료</option>
            <option value="FAILED"     th:selected="${filter.status == 'FAILED'}">결제 실패</option>
            <option value="CANCELLED"  th:selected="${filter.status == 'CANCELLED'}">취소</option>
        </select>
    </div>
    <div>
        <label for="startDate">시작일</label>
        <input id="startDate" type="datetime-local">
        <input type="hidden" id="startDateHidden" name="startDate" th:value="${filter.startDate}">
    </div>
    <div>
        <label for="endDate">종료일</label>
        <input id="endDate" type="datetime-local">
        <input type="hidden" id="endDateHidden" name="endDate" th:value="${filter.endDate}">
    </div>
    <div>
        <button type="submit">검색</button>
        <a th:href="@{/orders}" class="btn-reset" style="padding: 7px 16px; border-radius: 4px; text-decoration: none; font-size: 0.9rem; background: #eee; color: #333;">초기화</a>
    </div>
</form>

<table th:if="${!orders.isEmpty()}">
    <thead>
        <tr>
            <th>주문 ID</th>
            <th>회원 닉네임</th>
            <th>상태</th>
            <th>주문 상품</th>
            <th>합계</th>
            <th>주문 일시</th>
            <th>처리</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.orderId}"></td>
            <td th:text="${order.nickname}"></td>
            <td>
                <span class="status"
                      th:classappend="'status-' + ${order.status}"
                      th:text="${order.status}"></span>
            </td>
            <td>
                <ul class="items" style="margin:0; padding-left:16px;">
                    <li th:each="item : ${order.orderItems}"
                        th:text="${item.productName} + ' x' + ${item.quantity}"></li>
                </ul>
            </td>
            <td class="number" th:text="${#numbers.formatInteger(order.totalAmount, 0, 'COMMA')} + '원'"></td>
            <td class="local-time" th:attr="data-utc=${order.createdAt}"></td>
            <td>
                <button th:if="${order.status == 'COMPLETED'}"
                        class="btn-refund"
                        th:attr="onclick='openRefundModal(' + ${order.orderId} + ')'">환불</button>
                <button th:if="${order.status == 'CREATED'}"
                        class="btn-cancel"
                        th:attr="onclick='openCancelModal(' + ${order.orderId} + ')'">취소</button>
            </td>
        </tr>
    </tbody>
</table>

<div th:if="${orders.isEmpty()}" class="empty">주문 내역이 없습니다.</div>

<br>
<a href="/" class="home">← 홈으로</a>

<!-- 취소 확인 모달 -->
<div id="cancelModal" class="modal-backdrop">
    <div class="modal">
        <h2>주문 취소</h2>
        <p style="margin: 0 0 16px; font-size: 0.9rem; color: #555;">취소하면 재고가 복구되며 되돌릴 수 없습니다.</p>
        <form id="cancelForm" method="post">
            <div class="modal-actions">
                <button type="button" class="btn-cancel-modal" onclick="closeCancelModal()">닫기</button>
                <button type="submit" class="btn-confirm-cancel">취소 확인</button>
            </div>
        </form>
    </div>
</div>

<!-- 환불 모달 -->
<div id="refundModal" class="modal-backdrop">
    <div class="modal">
        <h2>환불 신청</h2>
        <form id="refundForm" method="post">
            <input type="hidden" name="_method" value="post">
            <label for="reason">환불 사유</label>
            <textarea id="reason" name="reason" rows="4" maxlength="200" placeholder="환불 사유를 입력하세요 (선택)"></textarea>
            <div class="modal-actions">
                <button type="button" class="btn-cancel-modal" onclick="closeRefundModal()">취소</button>
                <button type="submit" class="btn-confirm-refund">환불 확인</button>
            </div>
        </form>
    </div>
</div>

<script>
    // 주문 일시: UTC → 브라우저 로컬 시간대로 변환
    document.querySelectorAll('.local-time').forEach(td => {
        const utc = td.dataset.utc;
        if (utc) {
            td.textContent = new Date(utc).toLocaleString(undefined, {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
    });

    // 필터 날짜: 로컬 datetime-local 입력값 → ISO 8601(UTC) 변환 후 전송
    function isoToLocalInput(isoStr) {
        const d = new Date(isoStr);
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}-${mo}-${day}T${h}:${mi}`;
    }

    ['startDate', 'endDate'].forEach(id => {
        const hidden = document.getElementById(id + 'Hidden');
        if (hidden && hidden.value) {
            document.getElementById(id).value = isoToLocalInput(hidden.value);
        }
    });

    function setIsoDate(pickerId, hiddenId) {
        const picker = document.getElementById(pickerId);
        const hidden = document.getElementById(hiddenId);
        if (picker.value) {
            const [date, time] = picker.value.split('T');
            const [y, mo, d] = date.split('-').map(Number);
            const [h, mi] = time.split(':').map(Number);
            hidden.value = new Date(y, mo - 1, d, h, mi).toISOString();
        } else {
            hidden.value = '';
        }
    }

    document.querySelector('.filter-form').addEventListener('submit', function () {
        setIsoDate('startDate', 'startDateHidden');
        setIsoDate('endDate', 'endDateHidden');
    });

    function openCancelModal(orderId) {
        document.getElementById('cancelForm').action = '/orders/' + orderId + '/cancel';
        document.getElementById('cancelModal').classList.add('open');
    }

    function closeCancelModal() {
        document.getElementById('cancelModal').classList.remove('open');
    }

    document.getElementById('cancelModal').addEventListener('click', function(e) {
        if (e.target === this) closeCancelModal();
    });

    function openRefundModal(orderId) {
        document.getElementById('refundForm').action = '/orders/' + orderId + '/refund';
        document.getElementById('reason').value = '';
        document.getElementById('refundModal').classList.add('open');
    }

    function closeRefundModal() {
        document.getElementById('refundModal').classList.remove('open');
    }

    document.getElementById('refundModal').addEventListener('click', function(e) {
        if (e.target === this) closeRefundModal();
    });
</script>

</body>
</html>
