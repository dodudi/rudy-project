<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 수정</title>
    <style>
        body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 4px; }
        .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        textarea { height: 80px; resize: vertical; }
        .hint { font-size: 0.8rem; color: #888; margin-top: 3px; }
        .current { font-size: 0.8rem; color: #1976d2; margin-top: 3px; }
        .alert-error { background: #ffe0e0; border: 1px solid #f99; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        .actions { display: flex; gap: 8px; margin-top: 20px; }
        button[type=submit] { padding: 10px 24px; background: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        a.back { padding: 10px 16px; background: #eee; border-radius: 4px; text-decoration: none; color: #333; }
    </style>
</head>
<body>

<h1>상품 수정</h1>
<p class="subtitle" th:if="${product}">
    ID: <span th:text="${product.id}"></span> &nbsp;|&nbsp; 판매자: <span th:text="${product.nickname}"></span>
</p>

<div th:if="${error}" class="alert-error" th:text="${error}"></div>

<form th:action="@{/products/{id}/edit(id=${product.id})}" th:object="${updateRequest}" method="post">

    <div class="form-group">
        <label>상품명</label>
        <input type="text" th:field="*{name}" placeholder="변경할 이름 입력 (미입력 시 유지)">
        <div class="current" th:if="${product}">현재: <span th:text="${product.name}"></span></div>
        <div class="hint">영문, 숫자, 한글만 허용 (2~20자)</div>
    </div>

    <div class="form-group">
        <label>설명</label>
        <textarea th:field="*{description}" placeholder="변경할 설명 입력 (미입력 시 유지)"></textarea>
        <div class="current" th:if="${product}">현재: <span th:text="${product.description}"></span></div>
    </div>

    <div class="form-group">
        <label>가격 (원)</label>
        <input type="number" th:field="*{price}" placeholder="변경할 가격 입력 (미입력 시 유지)" min="0" max="100000000">
        <div class="current" th:if="${product}">현재: <span th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')}"></span>원</div>
    </div>

    <div class="form-group">
        <label>재고 (개)</label>
        <input type="number" th:field="*{stock}" placeholder="변경할 재고 입력 (미입력 시 유지)" min="0" max="10000000">
        <div class="current" th:if="${product}">현재: <span th:text="${#numbers.formatInteger(product.stock, 0, 'COMMA')}"></span>개</div>
    </div>

    <div class="actions">
        <button type="submit">수정</button>
        <a class="back" th:href="@{/products}">목록으로</a>
    </div>

</form>

</body>
</html>
