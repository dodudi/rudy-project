<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Commerce Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #333; }

    header { background: #1a1a2e; color: white; padding: 16px 32px; font-size: 20px; font-weight: bold; }

    .container { max-width: 1100px; margin: 32px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 24px; }

    .card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 24px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }

    .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; color: #666; }
    .form-group input, .form-group select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; min-width: 160px; }

    button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-sm { padding: 4px 12px; font-size: 13px; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-outline { background: white; border: 1px solid #ddd; color: #555; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f9fafb; text-align: left; padding: 10px 12px; border-bottom: 2px solid #e5e7eb; color: #555; font-weight: 600; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:hover td { background: #fafafa; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .badge-PENDING   { background: #fef3c7; color: #92400e; }
    .badge-COMPLETED { background: #d1fae5; color: #065f46; }
.badge-CANCELLED { background: #fee2e2; color: #991b1b; }
    .badge-FAILED    { background: #f3f4f6; color: #374151; }

    .items-list { font-size: 12px; color: #555; }
    .empty { text-align: center; color: #aaa; padding: 32px; }
    .result-msg { font-size: 13px; margin-top: 10px; min-height: 20px; }
    .result-ok  { color: #16a34a; }
    .result-err { color: #ef4444; }

    .section-divider { border: none; border-top: 1px solid #eee; margin: 16px 0; }

    /* 주문 항목 추가 UI */
    #order-items-rows { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
    .order-item-row { display: flex; gap: 8px; align-items: center; }
    .order-item-row select, .order-item-row input { padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .order-item-row select { flex: 2; }
    .order-item-row input { flex: 1; min-width: 80px; }
  </style>
</head>
<body>

<header>Commerce Admin</header>

<div class="container">

  <!-- 회원 가입 -->
  <div class="card">
    <h2>회원 가입</h2>
    <div class="form-row">
      <div class="form-group">
        <label>아이디 <span style="color:#ef4444">*</span></label>
        <input type="text" id="member-username" placeholder="예: john">
      </div>
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="member-nickname" placeholder="예: 홍길동">
      </div>
      <button class="btn-primary" onclick="createMember()">가입</button>
    </div>
    <p id="member-result" class="result-msg"></p>
  </div>

  <!-- 회원 목록 -->
  <div class="card">
    <h2>회원 목록</h2>
    <div style="margin-bottom: 16px;">
      <button class="btn-primary" onclick="fetchMembers()">조회</button>
    </div>
    <div id="member-table-container"><p class="empty">조회 버튼을 눌러주세요.</p></div>
  </div>

  <!-- 상품 등록 -->
  <div class="card">
    <h2>상품 등록</h2>
    <div class="form-row">
      <div class="form-group">
        <label>상품명 <span style="color:#ef4444">*</span></label>
        <input type="text" id="product-name" placeholder="예: 무선 이어폰">
      </div>
      <div class="form-group">
        <label>설명</label>
        <input type="text" id="product-description" placeholder="최대 500자" style="min-width:220px;">
      </div>
      <div class="form-group">
        <label>가격 (1,000 ~ 100,000)</label>
        <input type="number" id="product-price" placeholder="예: 50000" min="1000" max="100000">
      </div>
      <div class="form-group">
        <label>재고 (1 ~ 10,000)</label>
        <input type="number" id="product-stock" placeholder="예: 100" min="1" max="10000">
      </div>
      <button class="btn-primary" onclick="createProduct()">등록</button>
    </div>
    <p id="product-result" class="result-msg"></p>
  </div>

  <!-- 상품 목록 -->
  <div class="card">
    <h2>상품 목록</h2>
    <div style="margin-bottom: 16px;">
      <button class="btn-primary" onclick="fetchProducts()">조회</button>
    </div>
    <div id="product-table-container"><p class="empty">조회 버튼을 눌러주세요.</p></div>
  </div>

  <!-- 주문 생성 -->
  <div class="card">
    <h2>주문 생성</h2>
    <div class="form-row">
      <div class="form-group">
        <label>회원 ID <span style="color:#ef4444">*</span></label>
        <input type="number" id="create-memberId" placeholder="예: 1">
      </div>
    </div>
    <div id="order-items-rows"></div>
    <div style="display:flex; gap:8px; margin-bottom:8px;">
      <button class="btn-outline btn-sm" onclick="addOrderItemRow()">+ 상품 추가</button>
    </div>
    <button class="btn-primary" onclick="createOrder()">주문 생성</button>
    <p id="create-result" class="result-msg"></p>
  </div>

  <!-- 동시성 테스트 -->
  <div class="card">
    <h2>동시성 테스트 — 동시 주문</h2>
    <div class="form-row" style="margin-bottom:12px;">
      <div class="form-group">
        <label>회원 ID 시작</label>
        <input type="number" id="stress-memberStart" value="1" min="1" style="min-width:100px;">
      </div>
      <div class="form-group">
        <label>동시 요청 수</label>
        <input type="number" id="stress-count" value="5" min="1" max="100" style="min-width:100px;">
      </div>
    </div>
    <div id="stress-items-rows" style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px;"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button class="btn-outline btn-sm" onclick="addStressItemRow()">+ 상품 추가</button>
      <button class="btn-primary" onclick="runStressTest()">동시 실행</button>
    </div>
    <div id="stress-progress" style="margin-top:12px;display:none;">
      <div style="font-size:13px;color:#666;margin-bottom:6px;">
        성공: <span id="stress-ok" style="color:#16a34a;font-weight:600;">0</span>
        &nbsp;|&nbsp;
        실패: <span id="stress-fail" style="color:#ef4444;font-weight:600;">0</span>
        &nbsp;|&nbsp;
        전체: <span id="stress-total">0</span>
      </div>
      <div id="stress-bar-wrap" style="background:#e5e7eb;border-radius:4px;height:8px;overflow:hidden;">
        <div id="stress-bar-ok"   style="height:100%;background:#16a34a;float:left;transition:width .2s;width:0%"></div>
        <div id="stress-bar-fail" style="height:100%;background:#ef4444;float:left;transition:width .2s;width:0%"></div>
      </div>
    </div>
    <div id="stress-log" style="margin-top:12px;max-height:260px;overflow-y:auto;font-size:12px;font-family:monospace;"></div>
  </div>

  <!-- 주문 목록 조회 -->
  <div class="card">
    <h2>주문 목록 조회</h2>
    <div class="form-row">
      <div class="form-group">
        <label>회원 ID</label>
        <input type="number" id="filter-memberId" placeholder="전체">
      </div>
      <div class="form-group">
        <label>상태</label>
        <select id="filter-status">
          <option value="">전체</option>
          <option value="PENDING">PENDING</option>
          <option value="COMPLETED">COMPLETED</option>
          <option value="CANCELLED">CANCELLED</option>
          <option value="FAILED">FAILED</option>
        </select>
      </div>
      <div class="form-group">
        <label>시작일</label>
        <input type="datetime-local" id="filter-startDate">
      </div>
      <div class="form-group">
        <label>종료일</label>
        <input type="datetime-local" id="filter-endDate">
      </div>
      <button class="btn-primary" onclick="fetchOrders()">조회</button>
      <button class="btn-outline" onclick="resetFilter()">초기화</button>
    </div>
    <hr class="section-divider">
    <div id="order-table-container"><p class="empty">조회 버튼을 눌러주세요.</p></div>
  </div>

</div>

<script>
  const BASE = '';

  // ── 공통 ──────────────────────────────────────────────
  function setResult(id, msg, ok) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'result-msg ' + (ok ? 'result-ok' : 'result-err');
  }

  // ── 회원 ──────────────────────────────────────────────
  async function createMember() {
    const username = document.getElementById('member-username').value.trim();
    const nickname = document.getElementById('member-nickname').value.trim();
    if (!username) { setResult('member-result', '아이디를 입력해주세요.', false); return; }

    try {
      const res  = await fetch(`${BASE}/members`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, nickname })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message ?? `HTTP ${res.status}`);
      setResult('member-result', `가입 완료 — ID: ${data.id}, 아이디: ${data.username}, 닉네임: ${data.nickname ?? '-'}`, true);
      document.getElementById('member-username').value = '';
      document.getElementById('member-nickname').value = '';
      fetchMembers();
    } catch (e) { setResult('member-result', `오류: ${e.message}`, false); }
  }

  async function fetchMembers() {
    const container = document.getElementById('member-table-container');
    try {
      const res     = await fetch(`${BASE}/members`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const members = await res.json();
      if (!members.length) { container.innerHTML = '<p class="empty">등록된 회원이 없습니다.</p>'; return; }
      container.innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>아이디</th><th>닉네임</th></tr></thead>
          <tbody>${members.map(m => `
            <tr><td>${m.id}</td><td>${m.username}</td><td>${m.nickname ?? '-'}</td></tr>
          `).join('')}</tbody>
        </table>`;
    } catch (e) { container.innerHTML = `<p class="result-err">오류: ${e.message}</p>`; }
  }

  // ── 상품 ──────────────────────────────────────────────
  let products = [];

  async function createProduct() {
    const name        = document.getElementById('product-name').value.trim();
    const description = document.getElementById('product-description').value.trim();
    const price       = Number(document.getElementById('product-price').value);
    const stock       = Number(document.getElementById('product-stock').value);
    if (!name)  { setResult('product-result', '상품명을 입력해주세요.', false); return; }
    if (!price) { setResult('product-result', '가격을 입력해주세요.', false); return; }
    if (!stock) { setResult('product-result', '재고를 입력해주세요.', false); return; }

    try {
      const res  = await fetch(`${BASE}/products`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description, price, stock })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message ?? `HTTP ${res.status}`);
      setResult('product-result', `등록 완료 — ID: ${data.id}, ${data.name} / ${data.price.toLocaleString()}원 / 재고 ${data.stock}`, true);
      document.getElementById('product-name').value        = '';
      document.getElementById('product-description').value = '';
      document.getElementById('product-price').value       = '';
      document.getElementById('product-stock').value       = '';
      await fetchProducts();
    } catch (e) { setResult('product-result', `오류: ${e.message}`, false); }
  }

  async function fetchProducts() {
    const container = document.getElementById('product-table-container');
    try {
      const res = await fetch(`${BASE}/products`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      products  = await res.json();
      if (!products.length) { container.innerHTML = '<p class="empty">등록된 상품이 없습니다.</p>'; refreshOrderItemSelects(); return; }
      container.innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>상품명</th><th>가격</th><th>재고</th><th>설명</th></tr></thead>
          <tbody>${products.map(p => `
            <tr>
              <td>${p.id}</td>
              <td>${p.name}</td>
              <td>${p.price.toLocaleString()}원</td>
              <td>${p.stock}</td>
              <td style="color:#888;font-size:13px">${p.description ?? '-'}</td>
            </tr>
          `).join('')}</tbody>
        </table>`;
      refreshOrderItemSelects();
      refreshStressProductSelect();
    } catch (e) { container.innerHTML = `<p class="result-err">오류: ${e.message}</p>`; }
  }

  // ── 주문 생성 ──────────────────────────────────────────
  function addOrderItemRow() {
    const row = document.createElement('div');
    row.className = 'order-item-row';
    row.innerHTML = `
      <select>${productOptions()}</select>
      <input type="number" min="1" value="1" placeholder="수량">
      <button class="btn-danger btn-sm" onclick="this.parentElement.remove()">삭제</button>`;
    document.getElementById('order-items-rows').appendChild(row);
  }

  function productOptions() {
    if (!products.length) return '<option value="">상품 목록을 먼저 조회해주세요</option>';
    return products.map(p => `<option value="${p.id}">[${p.id}] ${p.name} — ${p.price.toLocaleString()}원 (재고 ${p.stock})</option>`).join('');
  }

  function refreshOrderItemSelects() {
    document.querySelectorAll('#order-items-rows select').forEach(sel => {
      const prev = sel.value;
      sel.innerHTML = productOptions();
      if (prev) sel.value = prev;
    });
  }

  async function createOrder() {
    const memberId = document.getElementById('create-memberId').value;
    if (!memberId) { setResult('create-result', '회원 ID를 입력해주세요.', false); return; }

    const rows = document.querySelectorAll('#order-items-rows .order-item-row');
    if (!rows.length) { setResult('create-result', '상품을 하나 이상 추가해주세요.', false); return; }

    const orderItems = Array.from(rows).map(row => ({
      productId: Number(row.querySelector('select').value),
      quantity:  Number(row.querySelector('input').value)
    }));

    try {
      const res  = await fetch(`${BASE}/orders`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memberId: Number(memberId), orderItems })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message ?? `HTTP ${res.status}`);
      setResult('create-result', `주문 생성 완료 — 주문 ID: ${data.orderId}, 총 금액: ${data.totalAmount.toLocaleString()}원`, true);
      document.getElementById('order-items-rows').innerHTML = '';
      fetchOrders();
      fetchProducts(); // 재고 갱신
    } catch (e) { setResult('create-result', `오류: ${e.message}`, false); }
  }

  // ── 주문 목록 ──────────────────────────────────────────
  async function fetchOrders() {
    const params = new URLSearchParams();
    const memberId  = document.getElementById('filter-memberId').value;
    const status    = document.getElementById('filter-status').value;
    const startDate = document.getElementById('filter-startDate').value;
    const endDate   = document.getElementById('filter-endDate').value;

    if (memberId)  params.append('memberId', memberId);
    if (status)    params.append('status', status);
    if (startDate) params.append('startDate', new Date(startDate).toISOString());
    if (endDate)   params.append('endDate',   new Date(endDate).toISOString());

    const container = document.getElementById('order-table-container');
    try {
      const res    = await fetch(`${BASE}/orders?${params}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const orders = await res.json();
      if (!orders.length) { container.innerHTML = '<p class="empty">조회된 주문이 없습니다.</p>'; return; }
      container.innerHTML = `
        <table>
          <thead>
            <tr><th>주문 ID</th><th>회원 ID</th><th>상태</th><th>총 금액</th><th>주문 항목</th><th>생성일시</th></tr>
          </thead>
          <tbody>${orders.map(o => `
            <tr>
              <td>${o.orderId}</td>
              <td>${o.memberId}</td>
              <td><span class="badge badge-${o.status}">${o.status}</span></td>
              <td>${o.totalAmount.toLocaleString()}원</td>
              <td class="items-list">${o.orderItems.map(i =>
                `상품 ${i.productId} × ${i.quantity} (${i.amount.toLocaleString()}원)`
              ).join('<br>')}</td>
              <td>${new Date(o.createdAt).toLocaleString('ko-KR')}</td>
            </tr>
          `).join('')}</tbody>
        </table>`;
    } catch (e) { container.innerHTML = `<p class="result-err">오류: ${e.message}</p>`; }
  }

  function resetFilter() {
    ['filter-memberId','filter-status','filter-startDate','filter-endDate'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('order-table-container').innerHTML = '<p class="empty">조회 버튼을 눌러주세요.</p>';
  }

  // ── 동시성 테스트 ──────────────────────────────────────
  function addStressItemRow() {
    const row = document.createElement('div');
    row.className = 'order-item-row';
    row.innerHTML = `
      <select>${productOptions()}</select>
      <input type="number" min="1" value="1" placeholder="수량">
      <button class="btn-danger btn-sm" onclick="this.parentElement.remove()">삭제</button>`;
    document.getElementById('stress-items-rows').appendChild(row);
  }

  function refreshStressProductSelect() {
    document.querySelectorAll('#stress-items-rows select').forEach(sel => {
      const prev = sel.value;
      sel.innerHTML = productOptions();
      if (prev) sel.value = prev;
    });
  }

  async function runStressTest() {
    const memberStart = Number(document.getElementById('stress-memberStart').value) || 1;
    const count       = Number(document.getElementById('stress-count').value)       || 1;

    const rows = document.querySelectorAll('#stress-items-rows .order-item-row');
    if (!rows.length) { alert('상품을 하나 이상 추가해주세요.'); return; }

    const orderItems = Array.from(rows).map(row => ({
      productId: Number(row.querySelector('select').value),
      quantity:  Number(row.querySelector('input').value) || 1
    }));

    const log      = document.getElementById('stress-log');
    const progress = document.getElementById('stress-progress');
    log.innerHTML  = '';
    progress.style.display = 'block';

    let ok = 0, fail = 0;
    const total = count;

    function updateProgress() {
      document.getElementById('stress-ok').textContent   = ok;
      document.getElementById('stress-fail').textContent = fail;
      document.getElementById('stress-total').textContent = total;
      document.getElementById('stress-bar-ok').style.width   = (ok   / total * 100) + '%';
      document.getElementById('stress-bar-fail').style.width = (fail / total * 100) + '%';
    }

    function appendLog(msg, success) {
      const line = document.createElement('div');
      line.style.color = success ? '#16a34a' : '#ef4444';
      line.textContent = msg;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    updateProgress();

    const requests = Array.from({ length: count }, (_, i) => {
      const memberId = memberStart + i;
      return fetch(`${BASE}/orders`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memberId, orderItems })
      })
      .then(async res => {
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.orderId === undefined) {
          throw new Error(data.message ?? `HTTP ${res.status}`);
        }
        ok++;
        updateProgress();
        appendLog(`[성공] 회원 ${memberId} → 주문 ID: ${data.orderId}, ${(data.totalAmount ?? 0).toLocaleString()}원`, true);
      })
      .catch(e => {
        fail++;
        updateProgress();
        appendLog(`[실패] 회원 ${memberId} → ${e.message}`, false);
      });
    });

    await Promise.all(requests);
    appendLog(`─── 완료: 성공 ${ok} / 실패 ${fail} / 전체 ${total} ───`, ok > 0);
    fetchProducts();
    fetchOrders();
  }

  // ── 초기 로드 ──────────────────────────────────────────
  fetchProducts();
</script>

</body>
</html>
