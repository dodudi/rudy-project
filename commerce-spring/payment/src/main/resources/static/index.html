<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Payment Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #333; }

    header { background: #0f172a; color: white; padding: 16px 32px; font-size: 20px; font-weight: bold; }

    .container { max-width: 1100px; margin: 32px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 24px; }

    .card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 24px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }

    button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f9fafb; text-align: left; padding: 10px 12px; border-bottom: 2px solid #e5e7eb; color: #555; font-weight: 600; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
    tr:hover td { background: #fafafa; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .badge-PENDING   { background: #fef3c7; color: #92400e; }
    .badge-COMPLETED { background: #d1fae5; color: #065f46; }
    .badge-FAILED    { background: #fee2e2; color: #991b1b; }

    .empty { text-align: center; color: #aaa; padding: 32px; }
    .result-err { color: #ef4444; text-align: center; padding: 16px; }
  </style>
</head>
<body>

<header>Payment Admin</header>

<div class="container">

  <div class="card">
    <h2>결제 목록</h2>
    <div style="margin-bottom: 16px;">
      <button class="btn-primary" onclick="fetchPayments()">조회</button>
    </div>
    <div id="payment-table-container"><p class="empty">조회 버튼을 눌러주세요.</p></div>
  </div>

</div>

<script>
  async function fetchPayments() {
    const container = document.getElementById('payment-table-container');
    try {
      const res      = await fetch('/payments');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const payments = await res.json();
      if (!payments.length) { container.innerHTML = '<p class="empty">결제 내역이 없습니다.</p>'; return; }
      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>결제 ID</th>
              <th>주문 ID</th>
              <th>회원 ID</th>
              <th>금액</th>
              <th>상태</th>
              <th>결제일시</th>
            </tr>
          </thead>
          <tbody>${payments.map(p => `
            <tr>
              <td>${p.id}</td>
              <td>${p.orderId}</td>
              <td>${p.memberId}</td>
              <td>${p.amount.toLocaleString()}원</td>
              <td><span class="badge badge-${p.status}">${p.status}</span></td>
              <td>${new Date(p.createdAt).toLocaleString('ko-KR')}</td>
            </tr>
          `).join('')}</tbody>
        </table>`;
    } catch (e) { container.innerHTML = `<p class="result-err">오류: ${e.message}</p>`; }
  }

  fetchPayments();
</script>

</body>
</html>
