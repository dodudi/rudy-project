<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 목록</title>
    <style>
        body { font-family: sans-serif; max-width: 980px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        a.btn { padding: 8px 16px; background: #4caf50; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; font-size: 0.9rem; }
        td.number { text-align: right; }
        .empty { text-align: center; padding: 40px; color: #999; }
        .alert-success { background: #e8f5e9; border: 1px solid #a5d6a7; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        .alert-error   { background: #ffebee; border: 1px solid #ef9a9a; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        a.home { font-size: 0.85rem; color: #888; text-decoration: none; }
        a.home:hover { text-decoration: underline; }

        .filter-bar { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
                      padding: 14px 16px; background: #f9f9f9; border: 1px solid #eee;
                      border-radius: 6px; margin-bottom: 20px; }
        .filter-bar .field { display: flex; flex-direction: column; gap: 4px; }
        .filter-bar label { font-size: 0.78rem; color: #666; }
        .filter-bar input[type="text"]   { padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; width: 160px; }
        .filter-bar input[type="number"] { padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; width: 110px; }
        .filter-bar .check-field { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; padding-bottom: 1px; }
        .btn-search { padding: 7px 18px; background: #1976d2; color: white; border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer; }
        .btn-search:hover { background: #1565c0; }
        .btn-reset  { padding: 7px 12px; background: #eee; color: #333; border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div th:if="${success}" class="alert-success" th:text="${success}"></div>
<div th:if="${error}"   class="alert-error"   th:text="${error}"></div>

<div class="top">
    <h1>상품 목록</h1>
    <a th:href="@{/products/new}" class="btn">+ 상품 추가</a>
</div>

<form class="filter-bar" method="get" th:action="@{/products}">
    <div class="field">
        <label>상품명</label>
        <input type="text" name="name" th:value="${filter.name}" placeholder="상품명 검색">
    </div>
    <div class="field">
        <label>최소 가격</label>
        <input type="number" name="minPrice" min="0"
               th:value="${filter.minPrice}" placeholder="0">
    </div>
    <div class="field">
        <label>최대 가격</label>
        <input type="number" name="maxPrice" min="0"
               th:value="${filter.maxPrice}" placeholder="100,000,000">
    </div>
    <div class="field">
        <label>&nbsp;</label>
        <div class="check-field">
            <input type="checkbox" id="hasStock" name="hasStock" value="true" th:checked="${filter.hasStock}">
            <label for="hasStock" style="margin:0; font-size:0.9rem;">재고 있음만</label>
        </div>
    </div>
    <button type="submit" class="btn-search">검색</button>
    <a th:href="@{/products}" class="btn-reset">초기화</a>
</form>

<table th:if="${!products.isEmpty()}">
    <thead>
        <tr>
            <th>ID</th>
            <th>상품명</th>
            <th>판매자</th>
            <th>설명</th>
            <th>가격</th>
            <th>재고</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.nickname}"></td>
            <td th:text="${product.description}"></td>
            <td class="number" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'"></td>
            <td class="number" th:text="${#numbers.formatInteger(product.stock, 0, 'COMMA')}"></td>
        </tr>
    </tbody>
</table>

<div th:if="${products.isEmpty()}" class="empty">조건에 맞는 상품이 없습니다.</div>

<br>
<a th:href="@{/}" class="home">← 홈으로</a>

</body>
</html>
