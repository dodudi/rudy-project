<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 목록</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        a.btn { padding: 8px 16px; background: #4caf50; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; font-size: 0.9rem; }
        td.number { text-align: right; }
        .empty { text-align: center; padding: 40px; color: #999; }
        .alert-success { background: #e8f5e9; border: 1px solid #a5d6a7; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        a.home { font-size: 0.85rem; color: #888; text-decoration: none; }
        a.home:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div th:if="${success}" class="alert-success" th:text="${success}"></div>

<div class="top">
    <h1>상품 목록</h1>
    <a th:href="@{/products/new}" class="btn">+ 상품 추가</a>
</div>

<table th:if="${!products.isEmpty()}">
    <thead>
        <tr>
            <th>ID</th>
            <th>상품명</th>
            <th>판매자</th>
            <th>설명</th>
            <th>가격</th>
            <th>재고</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.nickname}"></td>
            <td th:text="${product.description}"></td>
            <td class="number" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'"></td>
            <td class="number" th:text="${#numbers.formatInteger(product.stock, 0, 'COMMA')}"></td>
        </tr>
    </tbody>
</table>

<div th:if="${products.isEmpty()}" class="empty">등록된 상품이 없습니다.</div>

<br>
<a th:href="@{/}" class="home">← 홈으로</a>

</body>
</html>
