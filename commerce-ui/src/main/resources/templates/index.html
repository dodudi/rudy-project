<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Commerce Admin</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 1.6rem; margin-bottom: 32px; }
        .menu { display: flex; flex-direction: column; gap: 12px; }
        .menu a { display: block; padding: 14px 20px; background: #f5f5f5; border-radius: 6px; text-decoration: none; color: #333; font-size: 1rem; }
        .menu a:hover { background: #e0e0e0; }
        .section-title { font-size: 0.85rem; color: #999; margin: 16px 0 4px; }
    </style>
</head>
<body>

<h1>Commerce Admin</h1>

<div class="menu">
    <div class="section-title">회원</div>
    <a th:href="@{/members/new}">회원 추가</a>
    <a th:href="@{/members}">회원 목록</a>

    <div class="section-title">상품</div>
    <a th:href="@{/products/new}">상품 추가</a>
    <a th:href="@{/products}">상품 목록</a>

    <div class="section-title">주문</div>
    <a th:href="@{/orders/new}">주문 생성</a>
    <a th:href="@{/orders}">주문 목록</a>
</div>

</body>
</html>
