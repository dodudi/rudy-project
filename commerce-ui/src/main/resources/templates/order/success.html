<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 완료</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 24px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
        .info-row:last-child { border-bottom: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; }
        .total { font-weight: bold; font-size: 1.1rem; margin-top: 16px; text-align: right; }
        .btn-new { display: inline-block; margin-top: 20px; padding: 10px 24px; background: #4caf50; color: white; text-decoration: none; border-radius: 4px; }
        .no-order { color: #999; }
    </style>
</head>
<body>

<h1>주문이 완료되었습니다</h1>

<div th:if="${order}" class="card">
    <div class="info-row">
        <span>주문 번호</span>
        <span th:text="${order.orderId}"></span>
    </div>
    <div class="info-row">
        <span>회원 ID</span>
        <span th:text="${order.memberId}"></span>
    </div>
    <div class="info-row">
        <span>주문 상태</span>
        <span th:text="${order.status}"></span>
    </div>

    <table>
        <thead>
            <tr>
                <th>상품명</th>
                <th>단가</th>
                <th>수량</th>
                <th>소계</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${order.orderItems}">
                <td th:text="${item.productName}"></td>
                <td th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')} + '원'"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${#numbers.formatInteger(item.amount, 0, 'COMMA')} + '원'"></td>
            </tr>
        </tbody>
    </table>

    <div class="total">
        합계: <span th:text="${#numbers.formatInteger(order.totalAmount, 0, 'COMMA')} + '원'"></span>
    </div>
</div>

<div th:unless="${order}" class="no-order">주문 정보를 찾을 수 없습니다.</div>

<a href="/orders/new" class="btn-new">새 주문하기</a>

</body>
</html>
