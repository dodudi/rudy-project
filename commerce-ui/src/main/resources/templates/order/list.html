<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 목록</title>
    <style>
        body { font-family: sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        a.btn { padding: 8px 16px; background: #4caf50; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
        th { background: #f5f5f5; font-size: 0.9rem; }
        td.number { text-align: right; }
        .status { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .status-CREATED    { background: #e3f2fd; color: #1565c0; }
        .status-COMPLETED  { background: #e8f5e9; color: #2e7d32; }
        .status-SETTLED    { background: #f3e5f5; color: #6a1b9a; }
        .status-CANCELLED  { background: #fce4ec; color: #c62828; }
        .status-FAILED     { background: #ffebee; color: #b71c1c; }
        .items { font-size: 0.85rem; color: #555; }
        .items li { margin: 2px 0; }
        .empty { text-align: center; padding: 40px; color: #999; }
        a.home { font-size: 0.85rem; color: #888; text-decoration: none; }
        a.home:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="top">
    <h1>주문 목록</h1>
    <a th:href="@{/orders/new}" class="btn">+ 주문 생성</a>
</div>

<table th:if="${!orders.isEmpty()}">
    <thead>
        <tr>
            <th>주문 ID</th>
            <th>회원 ID</th>
            <th>상태</th>
            <th>주문 상품</th>
            <th>합계</th>
            <th>주문 일시</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.orderId}"></td>
            <td th:text="${order.memberId}"></td>
            <td>
                <span class="status"
                      th:classappend="'status-' + ${order.status}"
                      th:text="${order.status}"></span>
            </td>
            <td>
                <ul class="items" style="margin:0; padding-left:16px;">
                    <li th:each="item : ${order.orderItems}"
                        th:text="${item.productName} + ' x' + ${item.quantity}"></li>
                </ul>
            </td>
            <td class="number" th:text="${#numbers.formatInteger(order.totalAmount, 0, 'COMMA')} + '원'"></td>
            <td th:text="${order.createdAt}"></td>
        </tr>
    </tbody>
</table>

<div th:if="${orders.isEmpty()}" class="empty">주문 내역이 없습니다.</div>

<br>
<a href="/" class="home">← 홈으로</a>

</body>
</html>
