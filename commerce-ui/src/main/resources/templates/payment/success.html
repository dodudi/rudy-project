<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        p { color: #555; margin-bottom: 24px; }
        .params { text-align: left; background: #f5f5f5; border-radius: 8px; padding: 16px; margin-bottom: 24px; font-size: 0.9rem; }
        .params div { margin-bottom: 6px; }
        a.btn { display: inline-block; padding: 10px 24px; background: #4caf50; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="icon">✓</div>
<h1>결제가 완료되었습니다</h1>
<p>결제 승인은 아직 구현 전입니다.</p>

<div class="params">
    <div><strong>paymentKey:</strong> <span th:text="${param.paymentKey}"></span></div>
    <div><strong>orderId:</strong> <span th:text="${param.orderId}"></span></div>
    <div><strong>amount:</strong> <span th:text="${param.amount}"></span></div>
</div>

<a href="/orders" class="btn">주문 목록으로</a>

</body>
</html>
