services:
  eureka-server:
    image: eclipse-temurin:21-jre
    container_name: eureka-server
    working_dir: /app
    volumes:
      - ../eureka-server/build/libs:/app
    command: java -jar eureka-server-0.0.1-SNAPSHOT.jar
    ports:
      - "8761:8761"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  gateway:
    image: eclipse-temurin:21-jre
    container_name: gateway
    working_dir: /app
    volumes:
      - ../gateway/build/libs:/app
    command: java -jar gateway-0.0.1-SNAPSHOT.jar
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - backend-net


  redis:
    image: redis:7.4
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - backend-net
  postgresql:
    image: postgres:14.2
    container_name: postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test1234
      POSTGRES_DB: redis-study
    volumes:
      - ./postgresql-data:/var/lib/postgresql/data
    networks:
      - backend-net
  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge