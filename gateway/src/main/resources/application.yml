spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: commerce-route
              uri: lb://commerce
              predicates:
                - Path=/api/commerce/**
              filters:
                - StripPrefix=2

            - id: payment-route
              uri: lb://payment
              predicates:
                - Path=/api/payment/**
              filters:
                - StripPrefix=2

            - id: settlement-route
              uri: lb://settlement
              predicates:
                - Path=/api/settlement/**
              filters:
                - StripPrefix=2

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
